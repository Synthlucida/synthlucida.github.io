<!DOCTYPE html>
<html lang="en">
<head><link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SYNTHLUCIDA Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color-1: #1a0033;
    --bg-color-2: #000010;
    --accent-color: #00f0ff;
    --accent-glow: #ff00ff;
  }
  
  body.theme-neon { --bg-color-1: #1a0033; --bg-color-2: #000010; --accent-color: #00f0ff; --accent-glow: #ff00ff; }
  body.theme-space { --bg-color-1: #0a0a2a; --bg-color-2: #000000; --accent-color: #6a0dad; --accent-glow: #4b0082; }
  body.theme-earth { --bg-color-1: #1a2a1a; --bg-color-2: #051005; --accent-color: #00ff88; --accent-glow: #aaaa00; }
  body.theme-cyber { --bg-color-1: #2b00ff; --bg-color-2: #000000; --accent-color: #ff0055; --accent-glow: #00ffff; }
  body.theme-void { --bg-color-1: #080808; --bg-color-2: #000000; --accent-color: #777777; --accent-glow: #222222; }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: #ffffff;
    background: radial-gradient(circle at top, var(--bg-color-1), var(--bg-color-2), #000000);
    text-align: center;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: background 1s ease;
  }

  body::before {
    content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, var(--accent-color) 0%, transparent 5%),
                radial-gradient(circle, var(--accent-glow) 0%, transparent 5%);
    background-size: 150px 150px;
    opacity: 0.1;
    animation: move 20s linear infinite;
    z-index: -1;
  }

  @keyframes move { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .header { padding: 20px 20px 10px; }
  .logo { max-width: 100px; filter: drop-shadow(0 0 10px var(--accent-color)); margin-bottom: 5px; }
  .brand-name { font-size: 18px; margin-bottom: 5px; letter-spacing: 2px; }
  .desc-text { font-size: 9px; opacity: 0.7; padding: 0 20px; line-height: 1.4; margin-bottom: 10px; }
  
  /* Původní hudební sekce */
  .atmospheres {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; padding: 0 20px; flex-wrap: wrap;
  }
  .btn-atmos {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px;
    cursor: pointer; transition: 0.3s;
  }
  .btn-atmos.active {
    border-color: var(--accent-color);
    box-shadow: 0 0 15px var(--accent-color);
  }

  /* Nový jemný panel pro vizuální témata */
  .themes-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
  .btn-theme { background: none; border: none; color: #fff; opacity: 0.4; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; transition: 0.3s; padding: 2px 4px; letter-spacing: 1px; }
  .btn-theme.active, .btn-theme:hover { opacity: 1; color: var(--accent-color); text-shadow: 0 0 8px var(--accent-color); }

  .player-section { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding: 10px; overflow: hidden; }
  .track-title { font-size: 14px; font-weight: 600; color: var(--accent-color); margin-bottom: 10px; text-shadow: 0 0 10px var(--accent-color); }
  
  .playlist { list-style: none; padding: 0; margin: 0 auto 15px auto; width: 90%; max-height: 150px; overflow-y: auto; text-align: left; }
  .playlist li { font-size: 10px; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
  .playlist li:hover { color: var(--accent-color); }

  .equalizer { display: flex; justify-content: center; align-items: flex-end; gap: 5px; height: 30px; margin-bottom: 15px; opacity: 0.2; }
  .equalizer.active { opacity: 1; }
  .bar { width: 6px; height: 5px; background: var(--accent-color); border-radius: 4px; }
  .equalizer.active .bar { animation: bounce 0.8s infinite ease-in-out alternate; }
  @keyframes bounce { 0% { height: 5px; } 100% { height: 30px; } }

  .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
  .btn-ctrl { background: rgba(0,0,0,0.5); border: 2px solid var(--accent-color); color: var(--accent-color); width: 50px; height: 50px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .btn-ctrl:active { transform: scale(0.95); }

  .timer-section { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
  #timer-display { font-size: 10px; color: var(--accent-color); margin-right: 5px; width: 45px; text-align: left; }
  .btn-timer { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 8px; border-radius: 5px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; transition: 0.3s; }
  .btn-timer:hover { border-color: var(--accent-color); }

  .footer { padding: 15px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  .web-link { text-decoration: none; color: #fff; font-size: 10px; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 20px; }
</style>
</head>
<body class="theme-neon" id="body">

<div class="header">
  <img src="logo.jpg" alt="SYNTHLUCIDA" class="logo" onerror="this.style.display='none'">
  <div class="brand-name">SYNTHLUCIDA</div>
  <div class="desc-text">Experience 24/7 uninterrupted streaming. Enjoy continuous, free listening. Whether you need background music for focus, deep relaxation, or daily activities, this stream provides the perfect atmospheric soundtrack.</div>
</div>

<!-- Tlačítka pouze pro hudbu -->
<div class="atmospheres">
  <button class="btn-atmos active" onclick="setPlaylist('asmr', this)">ASMR</button>
  <button class="btn-atmos" onclick="setPlaylist('piano', this)">PIANO</button>
  <button class="btn-atmos" onclick="setPlaylist('chill', this)">CHILL</button>
</div>

<!-- Samostatná tlačítka pouze pro změnu vzhledu -->
<div class="themes-container">
  <span style="font-size: 8px; opacity: 0.3;">VISUAL:</span>
  <button class="btn-theme active" onclick="setVisualTheme('neon', this)">NEON</button>
  <button class="btn-theme" onclick="setVisualTheme('space', this)">SPACE</button>
  <button class="btn-theme" onclick="setVisualTheme('earth', this)">EARTH</button>
  <button class="btn-theme" onclick="setVisualTheme('cyber', this)">SYNTH</button>
  <button class="btn-theme" onclick="setVisualTheme('void', this)">DARK</button>
</div>

<div class="player-section">
  <div class="track-title" id="track-title">SELECT TRACK</div>
  
  <ul class="playlist" id="playlist"></ul>

  <div class="equalizer" id="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <div class="controls">
    <button class="btn-ctrl" id="btn-play">▶</button>
    <button class="btn-ctrl" id="btn-next">⏭</button>
  </div>

  <div class="timer-section">
    <span id="timer-display">⏱ Off</span>
    <button class="btn-timer" onclick="setTimer(15)">15m</button>
    <button class="btn-timer" onclick="setTimer(30)">30m</button>
    <button class="btn-timer" onclick="setTimer(60)">60m</button>
    <button class="btn-timer" onclick="cancelTimer()">✖</button>
  </div>
</div>

<div class="footer">
  <a href="https://synthlucida.github.io/" class="web-link" target="_blank">EXPLORE FULL WEBSITE</a>
  <a href="https://synthlucida.github.io/privacy_policy.html" class="web-link" target="_blank">PRIVACY POLICY</a>
</div>

<audio id="audio-player"></audio>

<script>
  // Původní 3 hudební sekce (nyní jako klíče 'asmr', 'piano', 'chill')
  const tracks = {
    asmr: [
      { title: "SYNTHLUCIDA - ASMR", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/asmr1.mp3" },
      { title: "SYNTHLUCIDA - ASMR Summer Walk", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/asmr_summer_walk.mp3" },
      { title: "SYNTHLUCIDA - ASMR 2", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/asmr2022.mp3" },
    ],
    piano: [
      { title: "SYNTHLUCIDA - Piano 1", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/nebula_piano1.mp3" },
      { title: "SYNTHLUCIDA - Nebula Piano 1", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/nebula_piano1.mp3" },
      { title: "SYNTHLUCIDA - Nebula Piano 2", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/nebula_piano2.mp3" },
      { title: "SYNTHLUCIDA - Ambient Piano 1", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/piano1.mp3" },
      { title: "SYNTHLUCIDA - Ambient Piano 2", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/piano2.mp3" },
      { title: "SYNTHLUCIDA - Polaris", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/polaris.mp3" },
      { title: "SYNTHLUCIDA - Mo leannan Seònaid", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/jane.mp3" },
    ],
    chill: [
      { title: "SYNTHLUCIDA - Spirits Of Summer", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/spirits_of_summer.mp3" },
      { title: "SYNTHLUCIDA - SunSets", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/sunset.mp3" },
      { title: "SYNTHLUCIDA - Everything", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/everything.mp3" },
      { title: "SYNTHLUCIDA - Back To Life", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/life.mp3" },
      { title: "SYNTHLUCIDA - Spirits of Spring", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/spring.mp3" },
      { title: "SYNTHLUCIDA - Fly With The Soul part2", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/fly_with_the_soul_part2.mp3" },
      { title: "SYNTHLUCIDA - Sky", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/sky.mp3" },
      { title: "SYNTHLUCIDA - Last Sunset", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/Last.Sunset.mp3" },
      { title: "SYNTHLUCIDA - Echoes Of Freedom", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/echoes_freedom.mp3" },
      { title: "SYNTHLUCIDA - Magic Waves", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/magic_waves.mp3" },
      { title: "SYNTHLUCIDA - Night Waves", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/night_waves.mp3" },
      { title: "SYNTHLUCIDA - Raindrops", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/raindrops.mp3" },
      { title: "SYNTHLUCIDA - Winning Moments", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/winning_moments.mp3" },
      { title: "SYNTHLUCIDA - You and Me", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/you_and_me.mp3" },
      { title: "SYNTHLUCIDA - Tropical Free Tones", src: "https://github.com/Synthlucida/synthlucida.github.io/releases/download/v1.0/tropical.mp3" },
    ]
  };

  let playlist = tracks['asmr'];
  let currentTrackIndex = -1;
  let isPlaying = false;
  
  let timeRemaining = 0;
  let timerInterval;

  const audio = document.getElementById('audio-player');
  const titleDiv = document.getElementById('track-title');
  const visualizer = document.getElementById('visualizer');
  const playBtn = document.getElementById('btn-play');
  const nextBtn = document.getElementById('btn-next');
  const body = document.getElementById('body');
  const playlistEl = document.getElementById('playlist');

  function updatePlaylistUI() {
    playlistEl.innerHTML = '';
    playlist.forEach((track, index) => {
      const li = document.createElement('li');
      li.innerText = track.title;
      li.onclick = () => playTrack(index);
      playlistEl.appendChild(li);
    });
  }

  // Funkce pouze pro změnu hudební sekce
  window.setPlaylist = function(key, btn) {
    playlist = tracks[key];
    document.querySelectorAll('.btn-atmos').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updatePlaylistUI();
    playRandom();
  };

  // Funkce pouze pro změnu vzhledu (atmosféry)
  window.setVisualTheme = function(theme, btn) {
    body.className = 'theme-' + theme;
    document.querySelectorAll('.btn-theme').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };

  function playTrack(index) {
    currentTrackIndex = index;
    const track = playlist[index];
    audio.src = track.src;
    titleDiv.innerText = track.title;
    audio.play();
    isPlaying = true;
    playBtn.innerText = "⏸";
    visualizer.classList.add('active');
  }

  function playRandom() {
    playTrack(Math.floor(Math.random() * playlist.length));
  }

  playBtn.addEventListener('click', () => {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playBtn.innerText = "▶";
      visualizer.classList.remove('active');
    } else {
      if (currentTrackIndex === -1) playRandom();
      else {
        audio.play();
        isPlaying = true;
        playBtn.innerText = "⏸";
        visualizer.classList.add('active');
      }
    }
  });

  nextBtn.addEventListener('click', playRandom);
  audio.addEventListener('ended', playRandom);

  // Časovač
  window.setTimer = function(minutes) {
    cancelTimer();
    timeRemaining = minutes * 60;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeRemaining--;
      updateTimerDisplay();
      if (timeRemaining <= 0) {
        cancelTimer();
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
          playBtn.innerText = "▶";
          visualizer.classList.remove('active');
        }
      }
    }, 1000);
  };

  window.cancelTimer = function() {
    clearInterval(timerInterval);
    timeRemaining = 0;
    document.getElementById('timer-display').innerText = "⏱ Off";
  };

  function updateTimerDisplay() {
    if (timeRemaining > 0) {
      let m = Math.floor(timeRemaining / 60);
      let s = timeRemaining % 60;
      document.getElementById('timer-display').innerText = `⏱ ${m}:${s < 10 ? '0' : ''}${s}`;
    }
  }

  // Inicializace
  updatePlaylistUI();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker zaregistrován:', reg))
        .catch((err) => console.log('Registrace SW selhala:', err));
    });
  }
</script>
</body>
</html>
