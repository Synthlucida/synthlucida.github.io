<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SYNTHLUCIDA | Ambient Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --cursor-x: 50vw; --cursor-y: 50vh; --hue: 260; }

  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020008; font-family: 'Orbitron', sans-serif; overflow: hidden; color: #fff; }

  #stars { position: absolute; top: 0; left: 0; z-index: 0; pointer-events: none; }

  .milkyway {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 32% 14% at 12% 12%, rgba(200,205,255,0.05), transparent 70%),
      radial-gradient(ellipse 38% 16% at 26% 24%, rgba(210,215,255,0.07), transparent 70%),
      radial-gradient(ellipse 34% 15% at 40% 34%, rgba(195,205,255,0.065), transparent 70%),
      radial-gradient(ellipse 40% 17% at 55% 44%, rgba(210,215,255,0.07), transparent 70%),
      radial-gradient(ellipse 34% 14% at 68% 52%, rgba(195,200,255,0.055), transparent 70%),
      radial-gradient(ellipse 36% 15% at 82% 60%, rgba(190,198,255,0.05), transparent 70%),
      radial-gradient(ellipse 30% 13% at 95% 68%, rgba(185,195,255,0.04), transparent 70%);
  }

  .moon-wrapper {
    position: absolute; top: 9vh; right: 12vw; width: 0; height: 0;
    z-index: 0; pointer-events: none; opacity: 0.72;
  }
  .moon-glow {
    position: absolute; top: 0; left: 0; width: 190px; height: 190px;
    transform: translate(-50%, -50%) scale(1);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,240,0.18) 0%, rgba(255,255,240,0.06) 42%, transparent 72%);
    will-change: transform, opacity;
    animation: moonGlowPulse 180s ease-in-out infinite;
  }
  .moon {
    position: absolute; top: 0; left: 0; width: 80px; height: 80px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    overflow: hidden; 
    filter: blur(1.6px); 
    box-shadow: 0 0 14px rgba(255,255,240,0.15);
    background:
      radial-gradient(circle at 66% 70%, rgba(80,78,68,0.4) 0%, rgba(150,148,135,0.12) 45%, transparent 58%),
      radial-gradient(circle at 30% 62%, rgba(80,78,68,0.32) 0%, rgba(150,148,135,0.10) 45%, transparent 58%),
      radial-gradient(circle at 74% 30%, rgba(80,78,68,0.3) 0%, rgba(150,148,135,0.10) 42%, transparent 55%),
      radial-gradient(circle at 44% 80%, rgba(80,78,68,0.26) 0%, transparent 50%),
      radial-gradient(circle at 20% 22%, rgba(80,78,68,0.22) 0%, transparent 45%),
      radial-gradient(circle at 55% 18%, rgba(80,78,68,0.2) 0%, transparent 40%),
      radial-gradient(circle at 62% 66%, rgba(105,102,90,0.22) 0%, transparent 34%),
      radial-gradient(circle at 26% 58%, rgba(105,102,90,0.16) 0%, transparent 30%),
      radial-gradient(circle at 40% 78%, rgba(105,102,90,0.12) 0%, transparent 24%),
      radial-gradient(circle at 35% 32%, #ece8db 0%, #ddd9c9 32%, #c2beac 60%, #a29d88 100%);
  }
  .moon-shadow {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 50%; background: #04030a;
    animation: moonPhase 180s ease-in-out infinite;
  }
  .moon-outline {
    position: absolute; top: 0; left: 0; width: 80px; height: 80px;
    transform: translate(-50%, -50%);
    border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
  }
  @keyframes moonPhase {
    0%   { transform: translateX(-100%); } 
    50%  { transform: translateX(0%); }    
    100% { transform: translateX(100%); }  
  }
  @keyframes moonGlowPulse {
    0%   { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%  { opacity: 0.1; transform: translate(-50%, -50%) scale(0.82); }
    100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  }

  @media (max-width: 480px) {
    .moon-wrapper { top: 7vh; right: 8vw; }
    .moon, .moon-outline { width: 56px; height: 56px; }
    .moon-glow { width: 140px; height: 140px; }
  }

  .sun {
    position: absolute; left: 50%; top: 58vh; width: 170vw; height: 170vw;
    transform: translateX(-50%) translateY(0);
    background: radial-gradient(circle,
      rgba(255, 150, 70, 0.11) 0%,
      rgba(255, 90, 90, 0.06) 30%,
      rgba(150, 40, 110, 0.03) 50%,
      transparent 72%);
    z-index: 1; pointer-events: none;
    animation: setSun 90s ease-in-out infinite alternate;
    will-change: transform, opacity;
  }

  @keyframes setSun {
    0% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
    100% { transform: translateX(-50%) translateY(7vh); opacity: 0.85; }
  }

  .canvas {
    position: absolute; top: -50vh; left: -50vw; width: 200vw; height: 200vh; z-index: 2; pointer-events: none;
    background: radial-gradient(circle, hsl(var(--hue), 30%, 15%) 0%, transparent 10%);
    background-position: center;
    transform: translate3d(0, 0, 0);
    will-change: transform;
  }

  .noise-overlay {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3; pointer-events: none;
    background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    opacity: 0.04;
  }

  #drops { position: absolute; top: 0; left: 0; z-index: 4; pointer-events: none; }

  .ui-container {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; width: 100%;
  }

  .headphones-notice {
    font-size: 0.55rem; letter-spacing: 4px; color: rgba(255,255,255,0.35);
    text-transform: uppercase; text-shadow: 0 0 8px rgba(255,255,255,0.1); margin-bottom: 2px;
  }

  .tap-notice {
    font-size: 0.5rem; letter-spacing: 3px; color: rgba(255,255,255,0.22);
    text-transform: uppercase; text-shadow: 0 0 6px rgba(255,255,255,0.08); margin-bottom: 4px;
  }

  .binaural-status {
    font-size: 0.65rem; letter-spacing: 5px; color: rgba(255,255,255,0.6);
    text-transform: uppercase; opacity: 0; transition: opacity 1s ease;
    text-shadow: 0 0 10px rgba(255,255,255,0.2); height: 12px; margin-bottom: 8px;
  }
  .binaural-status.active { opacity: 1; }

  .controls {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 20px; width: 100%; padding: 0 15px; box-sizing: border-box;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    text-align: center; padding: 10px 25px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.1); color: rgba(255,255,255,0.3);
    font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 3px;
    cursor: pointer; text-decoration: none; border-radius: 30px;
    transition: 0.5s; outline: none; backdrop-filter: blur(5px);
    box-sizing: border-box; white-space: nowrap;
  }
  .btn:hover, .btn.active-btn { border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

  .lang-btn {
    padding: 6px 14px; font-size: 0.55rem; letter-spacing: 2px;
    border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.05);
    color: rgba(255,255,255,0.2);
    position: relative;
  }
  .lang-btn::after {
    content: '';
    position: absolute;
    inset: -14px;
  }
  .lang-btn.active-btn { color: rgba(255,255,255,0.75); box-shadow: 0 0 10px rgba(255,255,255,0.12); }

  .volume-control {
    display: flex; align-items: center; gap: 8px;
  }

  .tap-synth-panel {
    position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%) translateY(10px);
    margin-bottom: 14px; min-width: 220px;
    display: flex; flex-direction: column; gap: 10px;
    padding: 14px 22px 16px; border-radius: 16px;
    background: rgba(10,8,20,0.55); border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .tap-synth-panel.open {
    opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0);
  }
  .tsp-title {
    font-size: 0.55rem; letter-spacing: 4px; color: rgba(255,255,255,0.4);
    text-align: center; margin-bottom: 2px;
  }
  .tsp-row { display: flex; align-items: center; gap: 12px; }
  .tsp-label {
    font-size: 0.5rem; letter-spacing: 2px; color: rgba(255,255,255,0.4);
    min-width: 52px; text-transform: uppercase;
  }
  .tsp-row input[type="range"] {
    -webkit-appearance: none; appearance: none; flex: 1;
    height: 2px; border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .tsp-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); cursor: pointer;
  }
  .tsp-row input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); cursor: pointer;
  }

  .vol-label {
    font-size: 0.55rem; letter-spacing: 3px; color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  #binaural-volume, #crickets-volume {
    -webkit-appearance: none; appearance: none;
    width: 90px; height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  #binaural-volume::-webkit-slider-thumb, #crickets-volume::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5);
    cursor: pointer;
  }
  #binaural-volume::-moz-range-thumb, #crickets-volume::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; border: none;
    background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); cursor: pointer;
  }
  #binaural-volume::-moz-range-track, #crickets-volume::-moz-range-track {
    height: 2px; border-radius: 2px; background: rgba(255,255,255,0.15);
  }

  .orb {
    position: absolute; border-radius: 50%; z-index: 1; pointer-events: none;
    will-change: transform, opacity;
  }
  .orb-1 {
    width: 45vw; height: 45vw; left: 8vw; top: 15vh;
    background: radial-gradient(circle, rgba(120, 80, 255, 0.07) 0%, rgba(80, 40, 200, 0.03) 45%, transparent 70%);
    animation: floatOrb1 38s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 38vw; height: 38vw; right: 5vw; top: 45vh;
    background: radial-gradient(circle, rgba(0, 200, 220, 0.06) 0%, rgba(0, 120, 180, 0.025) 45%, transparent 70%);
    animation: floatOrb2 46s ease-in-out infinite alternate;
  }
  .orb-3 {
    width: 30vw; height: 30vw; left: 35vw; bottom: -10vh;
    background: radial-gradient(circle, rgba(255, 60, 160, 0.05) 0%, rgba(200, 20, 120, 0.02) 45%, transparent 70%);
    animation: floatOrb3 52s ease-in-out infinite alternate;
  }

  @keyframes floatOrb1 {
    0%   { transform: translate3d(0, 0, 0) scale(1); opacity: 0.6; }
    100% { transform: translate3d(6vw, 8vh, 0) scale(1.15); opacity: 1; }
  }
  @keyframes floatOrb2 {
    0%   { transform: translate3d(0, 0, 0) scale(1); opacity: 0.5; }
    100% { transform: translate3d(-7vw, -6vh, 0) scale(1.1); opacity: 0.9; }
  }
  @keyframes floatOrb3 {
    0%   { transform: translate3d(0, 0, 0) scale(1); opacity: 0.4; }
    100% { transform: translate3d(5vw, -5vh, 0) scale(1.2); opacity: 0.8; }
  }

  @media (max-width: 480px) {
    .controls { gap: 12px; }
    .btn { padding: 9px 16px; font-size: 0.6rem; letter-spacing: 2px; }
    .lang-btn { padding: 6px 12px; font-size: 0.5rem; }
    .orb-1, .orb-2, .orb-3 { display: none; } 
  }
</style>
</head>
<body>

<audio id="crickets-audio" src="cvrcci.mp3" loop></audio>

<div class="milkyway"></div>
<canvas id="stars"></canvas>
<div class="sun"></div>
<div class="moon-wrapper">
  <div class="moon-glow"></div>
  <div class="moon">
    <div class="moon-shadow"></div>
  </div>
  <div class="moon-outline"></div>
</div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="canvas" id="canvas"></div>
<div class="noise-overlay"></div>
<canvas id="drops"></canvas>

<div class="ui-container">
  <div class="headphones-notice">BEST EXPERIENCED WITH HEADPHONES</div>
  <div class="tap-notice">TAP THE SKY TO PLAY A MELODY</div>
  <div id="binaural-status" class="binaural-status">DELTA WAVES (2Hz) - DEEP CALM</div>
  <div class="controls">
    <a href="player.html" class="btn">BACK TO PLAYER</a>
    
    <button id="binaural-btn" class="btn">BINAURAL: OFF</button>
    <div class="volume-control" id="volume-control">
      <span class="vol-label">VOL</span>
      <input type="range" id="binaural-volume" min="0" max="100" value="40">
    </div>

    <button id="crickets-btn" class="btn">NATURE: OFF</button>
    <div class="volume-control" id="crickets-volume-control">
      <span class="vol-label">VOL</span>
      <input type="range" id="crickets-volume" min="0" max="100" value="40">
    </div>

    <button id="tap-synth-toggle" class="btn lang-btn">🎛</button>
  </div>

  <div id="tap-synth-panel" class="tap-synth-panel">
    <div class="tsp-title">TAP MELODY</div>
    <div class="tsp-row"><span class="tsp-label">VOLUME</span><input type="range" id="tsp-volume" min="0" max="100" value="46"></div>
    <div class="tsp-row"><span class="tsp-label">TONE</span><input type="range" id="tsp-brightness" min="0" max="100" value="50"></div>
    <div class="tsp-row"><span class="tsp-label">ATTACK</span><input type="range" id="tsp-attack" min="0" max="100" value="10"></div>
    <div class="tsp-row"><span class="tsp-label">DECAY</span><input type="range" id="tsp-decay" min="0" max="100" value="43"></div>
    <div class="tsp-row"><span class="tsp-label">TIMBRE</span><input type="range" id="tsp-timbre" min="0" max="100" value="0"></div>
    <div class="tsp-row"><span class="tsp-label">DETUNE</span><input type="range" id="tsp-detune" min="0" max="100" value="15"></div>
    <div class="tsp-row"><span class="tsp-label">ECHO</span><input type="range" id="tsp-echo" min="0" max="100" value="51"></div>
    <div class="tsp-row"><span class="tsp-label">DEL T.</span><input type="range" id="tsp-delay-time" min="1" max="100" value="42"></div>
    <div class="tsp-row"><span class="tsp-label">FILT Q</span><input type="range" id="tsp-filter-q" min="0" max="100" value="0"></div>
    <div class="tsp-row"><span class="tsp-label">LFO</span><input type="range" id="tsp-lfo" min="0" max="100" value="0"></div>
    <div class="tsp-row"><span class="tsp-label">ARP</span><input type="range" id="tsp-arp" min="0" max="100" value="0"></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const dropsCanvas = document.getElementById('drops');
  const ctx = dropsCanvas.getContext('2d');
  
  const isMobile = window.innerWidth <= 768;

  let mouse = { x: -1000, y: -1000 };
  let pendingGlowUpdate = false;

  const starsCanvas = document.getElementById('stars');
  const starsCtx = starsCanvas.getContext('2d');

  function resize() {
    dropsCanvas.width = window.innerWidth;
    dropsCanvas.height = window.innerHeight;
    starsCanvas.width = window.innerWidth;
    starsCanvas.height = window.innerHeight;
  }
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 150);
  });
  resize();

  let drops = [];
  const numDrops = isMobile ? 22 : 55;
  const connectDist = isMobile ? 0 : 110; 
  const connectDistSq = connectDist * connectDist;

  function createDropSprite(size, blur, opacity) {
    const outerRadius = size + blur;
    const dim = Math.max(2, Math.ceil(outerRadius * 2));
    const c = document.createElement('canvas');
    c.width = dim;
    c.height = dim;
    const cctx = c.getContext('2d');
    const cx = dim / 2, cy = dim / 2;
    const solidStop = Math.max(0, Math.min(1, size / outerRadius));
    const gradient = cctx.createRadialGradient(cx, cy, 0, cx, cy, outerRadius);
    gradient.addColorStop(0, `rgba(255,255,255,${opacity})`);
    gradient.addColorStop(solidStop, `rgba(255,255,255,${opacity})`);
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    cctx.fillStyle = gradient;
    cctx.beginPath();
    cctx.arc(cx, cy, outerRadius, 0, Math.PI * 2);
    cctx.fill();
    return c;
  }

  for (let i = 0; i < numDrops; i++) {
    const isFast = Math.random() > 0.85;
    const speedMult = isFast ? (Math.random() * 1.2 + 0.5) : (Math.random() * 0.2 + 0.05);
    const initialVx = (Math.random() - 0.5) * speedMult;
    const initialVy = (Math.random() - 0.5) * speedMult;

    const size = Math.random() * 22 + 2;
    const blur = size * 0.55 + 3;
    const sizeNorm = (size - 2) / 22; 
    const opacity = (Math.random() * 0.12 + 0.015) * (1 - sizeNorm * 0.75);
    const sprite = createDropSprite(size, blur, opacity);

    drops.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      baseVx: initialVx, baseVy: initialVy,
      vx: initialVx, vy: initialVy,
      sprite: sprite,
      half: sprite.width / 2
    });
  }

  let isPageVisible = true;
  document.addEventListener('visibilitychange', () => {
    isPageVisible = document.visibilityState === 'visible';
    if (isPageVisible) {
      requestAnimationFrame(animateDrops);
      requestAnimationFrame(animateStars);
    }
  });

  function createStarSprite(radius) {
    const dim = Math.max(2, Math.ceil(radius * 4));
    const c = document.createElement('canvas');
    c.width = dim; c.height = dim;
    const cctx = c.getContext('2d');
    const cx = dim / 2, cy = dim / 2;
    const gradient = cctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 2);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.4, 'rgba(255,255,255,0.5)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    cctx.fillStyle = gradient;
    cctx.beginPath();
    cctx.arc(cx, cy, radius * 2, 0, Math.PI * 2);
    cctx.fill();
    return c;
  }

  const numStars = isMobile ? 90 : 220;
  const bandRatio = 0.55; 
  const stars = [];

  function gaussianish() {
    return (Math.random() + Math.random() + Math.random() - 1.5) / 1.5;
  }

  const bandStartX = -0.15 * window.innerWidth, bandStartY = 0.05 * window.innerHeight;
  const bandEndX = 1.15 * window.innerWidth, bandEndY = 0.62 * window.innerHeight;
  const bandDx = bandEndX - bandStartX, bandDy = bandEndY - bandStartY;
  const bandLen = Math.sqrt(bandDx * bandDx + bandDy * bandDy) || 1;
  const bandPerpX = -bandDy / bandLen, bandPerpY = bandDx / bandLen;
  const bandSpreadPx = isMobile ? 55 : 90;

  function bandPosition() {
    const t = Math.random();
    const cx = bandStartX + bandDx * t;
    const cy = bandStartY + bandDy * t;
    const offset = gaussianish() * bandSpreadPx;
    return { x: cx + bandPerpX * offset, y: cy + bandPerpY * offset };
  }

  for (let i = 0; i < numStars; i++) {
    const inBand = i < numStars * bandRatio;
    const pos = inBand
      ? bandPosition()
      : { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight };
    const radius = Math.random() * 1.1 + 0.4;
    stars.push({
      x: pos.x,
      y: pos.y,
      vx: (Math.random() - 0.5) * 0.012,
      vy: (Math.random() - 0.5) * 0.012,
      baseOpacity: (inBand ? Math.random() * 0.4 + 0.2 : Math.random() * 0.5 + 0.3),
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.0012 + 0.0006,
      sprite: createStarSprite(radius),
      half: 0
    });
    stars[i].half = stars[i].sprite.width / 2;
  }

  const flareChancePerFrame = 0.00007; 

  let meteors = [];
  function spawnMeteor(ts) {
    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -20 : window.innerWidth + 20;
    const startY = Math.random() * window.innerHeight * 0.4;
    const angle = (22 + Math.random() * 18) * Math.PI / 180; 
    const dir = fromLeft ? 1 : -1;
    const speed = (isMobile ? 0.55 : 0.8) * (window.innerWidth / 1000);
    meteors.push({
      startX, startY,
      vx: Math.cos(angle) * speed * dir,
      vy: Math.sin(angle) * speed,
      spawnTs: ts,
      duration: 750 + Math.random() * 450,
      len: (isMobile ? 55 : 85) + Math.random() * 55
    });
  }
  function scheduleMeteor() {
    const delay = 10000 + Math.random() * 18000; 
    setTimeout(() => {
      if (isPageVisible) spawnMeteor(performance.now());
      scheduleMeteor();
    }, delay);
  }
  scheduleMeteor();

  let satellites = [];
  function spawnSatellite(ts) {
    const fromLeft = Math.random() > 0.5;
    const y = Math.random() * window.innerHeight * 0.5;
    const speed = (isMobile ? 0.032 : 0.045) * (window.innerWidth / 1000);
    satellites.push({
      startX: fromLeft ? -20 : window.innerWidth + 20,
      y,
      vx: speed * (fromLeft ? 1 : -1),
      spawnTs: ts,
      duration: (window.innerWidth + 40) / speed
    });
  }
  function scheduleSatellite() {
    const delay = 20000 + Math.random() * 30000; 
    setTimeout(() => {
      if (isPageVisible) spawnSatellite(performance.now());
      scheduleSatellite();
    }, delay);
  }
  scheduleSatellite();

  let tapSparkles = [];

  function animateStars(ts) {
    if (!isPageVisible) return;
    ts = ts || 0;
    starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      s.x += s.vx; s.y += s.vy;
      if (s.x < -10) s.x = starsCanvas.width + 10;
      if (s.x > starsCanvas.width + 10) s.x = -10;
      if (s.y < -10) s.y = starsCanvas.height + 10;
      if (s.y > starsCanvas.height + 10) s.y = -10;

      if (!s.flareUntil || ts > s.flareUntil) {
        if (Math.random() < flareChancePerFrame) {
          s.flareStart = ts;
          s.flareUntil = ts + 180 + Math.random() * 220;
        }
      }
      let flareBoost = 0;
      if (s.flareUntil && ts < s.flareUntil) {
        const fp = (ts - s.flareStart) / (s.flareUntil - s.flareStart);
        flareBoost = Math.sin(fp * Math.PI) * 1.6;
      }

      const twinkle = 0.5 + 0.5 * Math.sin(ts * s.speed + s.phase);
      starsCtx.globalAlpha = Math.min(1, s.baseOpacity * twinkle + s.baseOpacity * flareBoost);
      starsCtx.drawImage(s.sprite, s.x - s.half, s.y - s.half);
    }
    starsCtx.globalAlpha = 1;

    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      const elapsed = ts - m.spawnTs;
      if (elapsed > m.duration) { meteors.splice(i, 1); continue; }
      const progress = elapsed / m.duration;
      const alpha = progress < 0.12 ? progress / 0.12 : 1 - (progress - 0.12) / 0.88;
      const headX = m.startX + m.vx * elapsed;
      const headY = m.startY + m.vy * elapsed;
      const dirLen = Math.hypot(m.vx, m.vy) || 1;
      const ux = m.vx / dirLen, uy = m.vy / dirLen;
      const tailX = headX - ux * m.len;
      const tailY = headY - uy * m.len;

      const grad = starsCtx.createLinearGradient(tailX, tailY, headX, headY);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(1, `rgba(255,255,255,${alpha})`);
      starsCtx.strokeStyle = grad;
      starsCtx.lineWidth = isMobile ? 1.4 : 2;
      starsCtx.beginPath();
      starsCtx.moveTo(tailX, tailY);
      starsCtx.lineTo(headX, headY);
      starsCtx.stroke();

      starsCtx.globalAlpha = alpha;
      starsCtx.fillStyle = '#ffffff';
      starsCtx.beginPath();
      starsCtx.arc(headX, headY, isMobile ? 1.3 : 1.7, 0, Math.PI * 2);
      starsCtx.fill();
      starsCtx.globalAlpha = 1;
    }

    for (let i = satellites.length - 1; i >= 0; i--) {
      const sat = satellites[i];
      const elapsed = ts - sat.spawnTs;
      if (elapsed > sat.duration) { satellites.splice(i, 1); continue; }
      const x = sat.startX + sat.vx * elapsed;
      const edgeFade = Math.min(1, elapsed / 900, (sat.duration - elapsed) / 900);
      starsCtx.globalAlpha = 0.55 * edgeFade;
      starsCtx.fillStyle = '#dfe8ff';
      starsCtx.beginPath();
      starsCtx.arc(x, sat.y, isMobile ? 1 : 1.3, 0, Math.PI * 2);
      starsCtx.fill();
      starsCtx.globalAlpha = 1;
    }

    for (let i = tapSparkles.length - 1; i >= 0; i--) {
      const tp = tapSparkles[i];
      const elapsed = ts - tp.spawnTs;
      if (elapsed > tp.duration) { tapSparkles.splice(i, 1); continue; }
      const p = elapsed / tp.duration;
      starsCtx.globalAlpha = (1 - p) * 0.45;
      starsCtx.strokeStyle = '#dfe8ff';
      starsCtx.lineWidth = 1.2;
      starsCtx.beginPath();
      starsCtx.arc(tp.x, tp.y, 4 + p * 28, 0, Math.PI * 2);
      starsCtx.stroke();
      starsCtx.globalAlpha = 1;
    }

    requestAnimationFrame(animateStars);
  }
  animateStars();

  function animateDrops() {
    if (!isPageVisible) return;
    ctx.clearRect(0, 0, dropsCanvas.width, dropsCanvas.height);

    if (connectDist > 0) {
      for (let i = 0; i < drops.length; i++) {
        for (let j = i + 1; j < drops.length; j++) {
          const dx = drops[i].x - drops[j].x;
          const dy = drops[i].y - drops[j].y;
          const distSq = dx * dx + dy * dy;
          if (distSq < connectDistSq) {
            const dist = Math.sqrt(distSq);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.06 - (dist / 1800)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(drops[i].x, drops[i].y);
            ctx.lineTo(drops[j].x, drops[j].y);
            ctx.stroke();
          }
        }
      }
    }

    for (let k = 0; k < drops.length; k++) {
      const d = drops[k];
      const mdx = d.x - mouse.x;
      const mdy = d.y - mouse.y;
      const mDistSq = mdx * mdx + mdy * mdy;
      if (mDistSq < 22500) { 
        const mDist = Math.sqrt(mDistSq) || 1;
        const force = (150 - mDist) / 150;
        d.vx += (mdx / mDist) * force * 0.2;
        d.vy += (mdy / mDist) * force * 0.2;
      }
      d.vx += (d.baseVx - d.vx) * 0.02;
      d.vy += (d.baseVy - d.vy) * 0.02;
      d.x += d.vx; d.y += d.vy;

      if (d.x < -40) d.x = dropsCanvas.width + 40;
      if (d.x > dropsCanvas.width + 40) d.x = -40;
      if (d.y < -40) d.y = dropsCanvas.height + 40;
      if (d.y > dropsCanvas.height + 40) d.y = -40;

      ctx.drawImage(d.sprite, d.x - d.half, d.y - d.half);
    }
    requestAnimationFrame(animateDrops);
  }
  animateDrops();

  function updateGlow() {
    if (pendingGlowUpdate) {
      const hue = (mouse.x / window.innerWidth) * 360;
      document.documentElement.style.setProperty('--hue', hue);
      canvas.style.transform = `translate3d(${mouse.x - window.innerWidth / 2}px, ${mouse.y - window.innerHeight / 2}px, 0)`;
      pendingGlowUpdate = false;
    }
    requestAnimationFrame(updateGlow);
  }
  updateGlow();

  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    pendingGlowUpdate = true;
  });
  document.addEventListener('touchmove', (e) => {
    mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
    pendingGlowUpdate = true;
  }, { passive: true });
  document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
  document.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; }, { passive: true });

  let audioCtx;
  let oscL, oscR, gainL, gainR, merger;
  let currentToneIndex = 0;
  const tones = [
    { name: "OFF", base: 0, beat: 0 },
    { name: "DELTA WAVES (2Hz) - DEEP REST", base: 136.1, beat: 2 },
    { name: "THETA WAVES (5Hz) - MEDITATION", base: 174.0, beat: 5 },
    { name: "ALPHA WAVES (9Hz) - RELAXATION", base: 256.0, beat: 9 }
  ];
  const binBtn = document.getElementById('binaural-btn');
  const binStatus = document.getElementById('binaural-status');
  const volumeControl = document.getElementById('volume-control');
  const volumeSlider = document.getElementById('binaural-volume');
  let currentVolume = (volumeSlider.value / 100) * 0.15;

  volumeSlider.addEventListener('input', () => {
    currentVolume = (volumeSlider.value / 100) * 0.15;
    if (audioCtx && currentToneIndex !== 0) {
      const now = audioCtx.currentTime;
      gainL.gain.setTargetAtTime(currentVolume, now, 0.3);
      gainR.gain.setTargetAtTime(currentVolume, now, 0.3);
    }
  });

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      merger = audioCtx.createChannelMerger(2);
      merger.connect(audioCtx.destination);
      gainL = audioCtx.createGain(); gainR = audioCtx.createGain();
      gainL.connect(merger, 0, 0); gainR.connect(merger, 0, 1);
      gainL.gain.value = 0; gainR.gain.value = 0;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(base, beat) {
    if (oscL) { oscL.stop(); oscL.disconnect(); }
    if (oscR) { oscR.stop(); oscR.disconnect(); }
    oscL = audioCtx.createOscillator(); oscR = audioCtx.createOscillator();
    oscL.type = 'sine'; oscR.type = 'sine';
    oscL.frequency.value = base; oscR.frequency.value = base + beat;
    oscL.connect(gainL); oscR.connect(gainR);
    oscL.start(); oscR.start();
    const now = audioCtx.currentTime;
    gainL.gain.cancelScheduledValues(now); gainR.gain.cancelScheduledValues(now);
    gainL.gain.setTargetAtTime(currentVolume, now, 2.5); gainR.gain.setTargetAtTime(currentVolume, now, 2.5);
  }

  function stopTone() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    gainL.gain.cancelScheduledValues(now); gainR.gain.cancelScheduledValues(now);
    gainL.gain.setTargetAtTime(0, now, 1.5); gainR.gain.setTargetAtTime(0, now, 1.5);
  }

  binBtn.addEventListener('click', () => {
    initAudio();
    currentToneIndex = (currentToneIndex + 1) % tones.length;
    const state = tones[currentToneIndex];
    if (currentToneIndex === 0) {
      stopTone();
      binBtn.innerText = "BINAURAL: OFF";
      binBtn.classList.remove('active-btn');
      binStatus.classList.remove('active');
    } else {
      playTone(state.base, state.beat);
      binBtn.innerText = `BINAURAL: ON`;
      binBtn.classList.add('active-btn');
      binStatus.innerText = state.name;
      binStatus.classList.add('active');
    }
  });

  const cricketsAudio = document.getElementById('crickets-audio');
  const cricketsBtn = document.getElementById('crickets-btn');
  const cricketsVolSlider = document.getElementById('crickets-volume');

  cricketsAudio.volume = cricketsVolSlider.value / 100;

  cricketsVolSlider.addEventListener('input', (e) => {
    cricketsAudio.volume = e.target.value / 100;
  });

  cricketsBtn.addEventListener('click', () => {
    if (cricketsAudio.paused) {
      cricketsAudio.play().catch(err => console.log("Audio se nepovedlo spustit: ", err));
      cricketsBtn.innerText = "NATURE: ON";
      cricketsBtn.classList.add('active-btn');
    } else {
      cricketsAudio.pause();
      cricketsBtn.innerText = "NATURE: OFF";
      cricketsBtn.classList.remove('active-btn');
    }
  });

  let tapMasterGain, tapDelay, tapFeedback, tapDelayFilter;
  const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];

  let tapVolume = 0.16;      
  let tapBrightness = 1;     
  let tapDecay = 2.6;        
  let tapEcho = 0.28;        
  let tapDelayTime = 0.84;   
  let tapFilterQ = 1;        
  let tapLfo = 0;            
  let tapArp = 0;
  
  // NOVÉ PROMENNÉ PRO BARVU TÓNU
  let tapAttackTime = 0.16;  // Rychlost náběhu tónu
  let tapTimbreBlend = 0;    // Blend pro klavírní nádech
  let tapDetuneVal = 1.006;  // Rozladění oscilátorů

  function initTapAudio() {
    initAudio(); 
    if (tapMasterGain) return;
    tapMasterGain = audioCtx.createGain();
    tapMasterGain.gain.value = tapVolume;
    tapMasterGain.connect(audioCtx.destination);

    tapDelay = audioCtx.createDelay(2.0);
    tapDelay.delayTime.value = tapDelayTime;
    tapFeedback = audioCtx.createGain();
    tapFeedback.gain.value = tapEcho;
    tapDelayFilter = audioCtx.createBiquadFilter();
    tapDelayFilter.type = 'lowpass';
    tapDelayFilter.frequency.value = 2200;

    tapDelay.connect(tapFeedback);
    tapFeedback.connect(tapDelayFilter);
    tapDelayFilter.connect(tapDelay);
    tapDelay.connect(tapMasterGain);
  }

  function playAmbientNote(xRatio, yRatio) {
    initTapAudio();
    const now = audioCtx.currentTime;

    const noteIndex = Math.min(pentatonic.length - 1, Math.floor(xRatio * pentatonic.length));
    const baseFreq = pentatonic[noteIndex] * (yRatio < 0.5 ? 2 : 1);

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    
    // Změna vln podle TIMBRE - nad 40% přidáme bohatší harmonické křivky (klavírní/FM vibe)
    osc1.type = tapTimbreBlend > 0.4 ? 'triangle' : 'sine';
    osc2.type = tapTimbreBlend > 0.7 ? 'square' : (tapTimbreBlend > 0.2 ? 'triangle' : 'sine');

    const noteFilter = audioCtx.createBiquadFilter();
    noteFilter.type = 'lowpass';
    noteFilter.Q.value = tapFilterQ;

    // ARPEGGIATOR LOGIKA
    if (tapArp > 0) {
      const stepTime = 0.05 + (1 - tapArp) * 0.3; 
      let t = now;
      let step = 0;
      while (t < now + tapDecay + 0.5) {
        const arpIndex = Math.min(pentatonic.length - 1, noteIndex + (step % 4));
        const aFreq = pentatonic[arpIndex] * (yRatio < 0.5 ? 2 : 1) * (Math.floor(step / 4) % 2 === 1 ? 2 : 1);
        osc1.frequency.setValueAtTime(aFreq, t);
        osc2.frequency.setValueAtTime(aFreq * tapDetuneVal, t);
        t += stepTime;
        step++;
      }
    } else {
      osc1.frequency.value = baseFreq;
      osc2.frequency.value = baseFreq * tapDetuneVal; // Přidáno ovládání rozladění
    }

    const noteGain = audioCtx.createGain();
    noteGain.gain.value = 0;

    osc1.connect(noteFilter);
    osc2.connect(noteFilter);
    noteFilter.connect(noteGain);
    noteGain.connect(tapMasterGain);
    noteGain.connect(tapDelay);

    // LFO MODULACE FILTRU
    if (tapLfo > 0) {
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.5 + tapLfo * 10;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = (900 + (1 - yRatio) * 2600) * tapBrightness * (0.2 + tapLfo * 0.5);
      lfo.connect(lfoGain);
      lfoGain.connect(noteFilter.frequency);
      lfo.start(now);
      lfo.stop(now + tapDecay + 0.2);
    }

    // Nastavení obálky filtru pro "klavírní úhoz"
    const filterMax = (900 + (1 - yRatio) * 2600) * tapBrightness;
    if (tapTimbreBlend > 0.3 && tapAttackTime < 0.2) {
      // Pokud je rychlý attack a vyšší timbre, filtr "kopne" a pak se zavře jako struna klavíru
      noteFilter.frequency.setValueAtTime(filterMax * (1 + tapTimbreBlend), now);
      noteFilter.frequency.exponentialRampToValueAtTime(filterMax * 0.4, now + (tapDecay * 0.4));
    } else {
      // Klasický otevřený filtr pro táhlé zvuky
      noteFilter.frequency.value = filterMax;
    }

    // Hlasitostní obálka - zapojený parametr ATTACK
    noteGain.gain.setValueAtTime(0, now);
    noteGain.gain.linearRampToValueAtTime(0.9, now + tapAttackTime);
    noteGain.gain.exponentialRampToValueAtTime(0.001, now + tapDecay);

    osc1.start(now); osc2.start(now);
    osc1.stop(now + tapDecay + 0.2); osc2.stop(now + tapDecay + 0.2);
  }

  function handleSkyTap(e) {
    if (e.target.closest && e.target.closest('.ui-container')) return;
    const x = e.clientX, y = e.clientY;
    playAmbientNote(x / window.innerWidth, y / window.innerHeight);
    tapSparkles.push({ x, y, spawnTs: performance.now(), duration: 900 });
  }
  document.addEventListener('pointerdown', handleSkyTap);

  const tapSynthToggle = document.getElementById('tap-synth-toggle');
  const tapSynthPanel = document.getElementById('tap-synth-panel');
  tapSynthToggle.addEventListener('click', () => {
    tapSynthPanel.classList.toggle('open');
    tapSynthToggle.classList.toggle('active-btn');
  });

  document.getElementById('tsp-volume').addEventListener('input', (e) => {
    tapVolume = (e.target.value / 100) * 0.35;
    if (tapMasterGain) tapMasterGain.gain.setTargetAtTime(tapVolume, audioCtx.currentTime, 0.1);
  });
  document.getElementById('tsp-brightness').addEventListener('input', (e) => {
    tapBrightness = 0.4 + (e.target.value / 100) * 1.4;
  });
  document.getElementById('tsp-decay').addEventListener('input', (e) => {
    tapDecay = 0.8 + (e.target.value / 100) * 4.2;
  });
  document.getElementById('tsp-echo').addEventListener('input', (e) => {
    tapEcho = (e.target.value / 100) * 0.55;
    if (tapFeedback) tapFeedback.gain.setTargetAtTime(tapEcho, audioCtx.currentTime, 0.1);
  });
  document.getElementById('tsp-delay-time').addEventListener('input', (e) => {
    tapDelayTime = 0.1 + (e.target.value / 100) * 1.9;
    if (tapDelay) tapDelay.delayTime.setTargetAtTime(tapDelayTime, audioCtx.currentTime, 0.1);
  });
  document.getElementById('tsp-filter-q').addEventListener('input', (e) => {
    tapFilterQ = 1 + (e.target.value / 100) * 15;
  });
  document.getElementById('tsp-lfo').addEventListener('input', (e) => {
    tapLfo = (e.target.value / 100); 
  });
  document.getElementById('tsp-arp').addEventListener('input', (e) => {
    tapArp = (e.target.value / 100); 
  });
  
  // NOVÉ LISTENERY
  document.getElementById('tsp-attack').addEventListener('input', (e) => {
    // 0 = 10ms (klavír/brnkání), 100 = 1.5s (dlouhý táhlý nájezd)
    tapAttackTime = 0.01 + (e.target.value / 100) * 1.5; 
  });
  document.getElementById('tsp-timbre').addEventListener('input', (e) => {
    tapTimbreBlend = e.target.value / 100;
  });
  document.getElementById('tsp-detune').addEventListener('input', (e) => {
    // Od čistého 1.000 až po rozladěný chorus 1.040
    tapDetuneVal = 1 + (e.target.value / 100) * 0.04; 
  });

</script>
</body>
